spring.application.name=order-service
server.port=8083

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.datasource.url=jdbc:h2:mem:orderdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

spring.cloud.stream.bindings.orderCreated-out-0.destination=order-created
spring.cloud.stream.bindings.handleStockReserved-in-0.destination=stock-reserved
spring.cloud.stream.bindings.handleStockRejected-in-0.destination=stock-rejected
spring.cloud.function.definition=handleStockReserved;handleStockRejected
spring.cloud.stream.bindings.orderCanceled-out-0.destination=order-canceled