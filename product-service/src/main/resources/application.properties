spring.application.name=product-service
server.port=8082
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.datasource.url=jdbc:h2:mem:productdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

spring.cloud.stream.bindings.handleOrderCreated-in-0.destination=order-created
spring.cloud.stream.bindings.stockReserved-out-0.destination=stock-reserved
spring.cloud.stream.bindings.stockRejected-out-0.destination=stock-rejected
spring.cloud.function.definition=handleOrderCreated;handleOrderCanceled
spring.cloud.stream.bindings.handleOrderCanceled-in-0.destination=order-canceled

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}